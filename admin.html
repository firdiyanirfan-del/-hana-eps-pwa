<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - EPS-TOPIK Hana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: #0c1424; color: #e2e8f0; }
    .card { background: #151C2C; border: 1px solid #2E3A59; border-radius: 16px; padding: 20px; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-bug { background: #ef4444; color: white; }
    .badge-saran { background: #6366f1; color: white; }
    .badge-pujian { background: #22c55e; color: white; }

    @keyframes toast-in { 0% { opacity: 0; transform: translateX(100%) scale(0.9); } 100% { opacity: 1; transform: translateX(0) scale(1); } }
    @keyframes toast-out { 0% { opacity: 1; transform: translateX(0) scale(1); } 100% { opacity: 0; transform: translateX(100%) scale(0.9); } }
    @keyframes confirm-in { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
    .toast-animate { animation: toast-in 0.3s ease-out; }
    .toast-animate-out { animation: toast-out 0.25s ease-in forwards; }
    .confirm-animate { animation: confirm-in 0.2s ease-out; }
  </style>
</head>
<body class="p-6 max-w-6xl mx-auto">
  <div id="toast-container" class="fixed top-4 right-4 z-[99999] flex flex-col gap-2 pointer-events-none"></div>

  <div class="flex items-center justify-between mb-8">
    <h1 class="text-2xl font-extrabold text-white">📊 Admin Panel</h1>
    <button onclick="logout()" class="text-sm text-slate-400 hover:text-white transition">Logout</button>
  </div>

  <div id="login-section" class="card text-center py-12 hidden">
    <p class="text-slate-400 mb-4">Login dengan akun admin Google untuk mengakses panel</p>
    <button onclick="login()" class="px-6 py-2.5 bg-[#6C63FF] text-white rounded-xl font-bold hover:brightness-110 transition">Login dengan Google</button>
  </div>

  <div id="dashboard-section" class="hidden">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8" id="stats-cards"></div>
    <div class="card mb-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold">User Terdaftar</h2>
        <input id="search-input" placeholder="Cari..." class="bg-[#1e2a4a] text-white px-3 py-1.5 rounded-lg text-sm border border-[#2E3A59] focus:outline-none" oninput="loadUsers()">
      </div>
      <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-slate-400 text-left"><th class="pb-2 pr-4">Nama</th><th class="pb-2 pr-4">Email</th><th class="pb-2 pr-4">XP</th><th class="pb-2 pr-4">Streak</th><th class="pb-2 pr-4">Premium</th><th class="pb-2 pr-4">Tanggal</th><th class="pb-2">Aksi</th></tr></thead><tbody id="users-table"></tbody></table></div>
      <div id="pagination" class="flex justify-center gap-2 mt-4"></div>
    </div>
    <div class="card">
      <h2 class="font-bold mb-4">Feedback Terbaru</h2>
      <div id="feedback-list"></div>
    </div>
  </div>

  <script>
    let token = localStorage.getItem('eps_token');
    let _confirmResolve = null;

    // ===================== TOAST SYSTEM =====================
    function showToast(type, message) {
      const container = document.getElementById('toast-container');
      const icons = { success: 'check_circle', error: 'error', info: 'info' };
      const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600' };
      const el = document.createElement('div');
      el.className = `toast-animate pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-2xl shadow-2xl text-white text-sm font-medium ${colors[type] || 'bg-slate-700'} max-w-sm`;
      el.innerHTML = `<span class="material-symbols-outlined text-[20px]">${icons[type] || 'info'}</span><span class="flex-1">${message}</span>`;
      container.appendChild(el);
      setTimeout(() => {
        el.classList.remove('toast-animate');
        el.classList.add('toast-animate-out');
        setTimeout(() => el.remove(), 260);
      }, 3000);
    }

    // ===================== CONFIRM MODAL =====================
    function showConfirm(message) {
      return new Promise((resolve) => {
        _confirmResolve = resolve;
        const existing = document.getElementById('admin-confirm-overlay');
        if (existing) existing.remove();

        const overlay = document.createElement('div');
        overlay.id = 'admin-confirm-overlay';
        overlay.className = 'fixed inset-0 z-[99998] flex items-center justify-center bg-black/60 backdrop-blur-sm px-6';
        overlay.innerHTML =
          `<div class="confirm-animate bg-[#151C2C] border border-[#2E3A59] rounded-3xl p-7 max-w-sm w-full shadow-2xl">
            <div class="flex flex-col items-center text-center gap-4">
              <div class="w-14 h-14 rounded-full bg-[#6C63FF]/15 flex items-center justify-center">
                <span class="material-symbols-outlined text-[28px] text-[#6C63FF]">help_outline</span>
              </div>
              <p class="text-base font-semibold text-white">${message}</p>
              <div class="flex gap-3 w-full mt-1">
                <button id="admin-confirm-no" class="flex-1 py-2.5 px-4 bg-slate-700 text-slate-300 rounded-xl font-semibold text-sm hover:bg-slate-600 active:scale-[0.97] transition-all">Batal</button>
                <button id="admin-confirm-yes" class="flex-1 py-2.5 px-4 bg-[#6C63FF] text-white rounded-xl font-semibold text-sm hover:brightness-110 active:scale-[0.97] transition-all">Ya, lanjutkan</button>
              </div>
            </div>
          </div>`;
        document.body.appendChild(overlay);

        document.getElementById('admin-confirm-yes').onclick = () => { overlay.remove(); resolve(true); };
        document.getElementById('admin-confirm-no').onclick = () => { overlay.remove(); resolve(false); };
        overlay.onclick = (e) => { if (e.target === overlay) { overlay.remove(); resolve(false); } };
      });
    }

    // ===================== AUTH =====================
    function login() {
      window.location.href = '/api/auth/google?state=admin.html';
    }

    function logout() {
      localStorage.removeItem('eps_token');
      token = null;
      showLogin();
    }

    function showLogin() {
      document.getElementById('login-section').classList.remove('hidden');
      document.getElementById('dashboard-section').classList.add('hidden');
    }

    function showDashboard() {
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('dashboard-section').classList.remove('hidden');
    }

    // ===================== API CLIENT =====================
    async function api(path, opts) {
      try {
        const res = await fetch(path, { ...opts, headers: { ...opts?.headers, Authorization: `Bearer ${token}` } });
        if (res.status === 401 || res.status === 403) {
          token = null; localStorage.removeItem('eps_token'); showLogin();
          showToast('error', 'Sesi habis. Login kembali.');
          return null;
        }
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          showToast('error', err.error || 'Gagal memproses permintaan');
          return null;
        }
        return res.json();
      } catch (e) {
        showToast('error', 'Gagal terhubung ke server');
        return null;
      }
    }

    // ===================== LOADERS =====================
    async function loadStats() {
      const data = await api('/api/admin/stats');
      if (!data) return;
      document.getElementById('stats-cards').innerHTML = `
        <div class="card text-center"><p class="text-3xl font-extrabold text-[#6C63FF]">${data.totalUsers}</p><p class="text-xs text-slate-400 mt-1">Total User</p></div>
        <div class="card text-center"><p class="text-3xl font-extrabold text-[#22c55e]">${data.totalXp.toLocaleString()}</p><p class="text-xs text-slate-400 mt-1">Total XP</p></div>
        <div class="card text-center"><p class="text-3xl font-extrabold text-[#f59e0b]">${data.totalFeedback}</p><p class="text-xs text-slate-400 mt-1">Feedback</p></div>`;
    }

    let currentPage = 1;

    async function loadUsers() {
      const search = document.getElementById('search-input').value;
      const data = await api(`/api/admin/users?page=${currentPage}&search=${encodeURIComponent(search)}`);
      if (!data) return;
      const tbody = document.getElementById('users-table');
      tbody.innerHTML = data.users.map(u => `<tr class="border-t border-[#2E3A59]/50"><td class="py-2 pr-4">${u.name || '-'}</td><td class="py-2 pr-4 text-slate-400">${u.email}</td><td class="py-2 pr-4">${u.xp || 0}</td><td class="py-2 pr-4">${u.streak || 0}</td><td class="py-2 pr-4"><button onclick="togglePremium(${u.id}, ${u.is_premium})" class="text-xs px-2.5 py-1 rounded-full font-semibold ${u.is_premium ? 'bg-green-600 text-white' : 'bg-slate-600 text-slate-300 hover:bg-green-600 hover:text-white'} transition">${u.is_premium ? 'Premium' : 'Free'}</button></td><td class="py-2 pr-4 text-slate-400 text-xs">${u.created_at ? new Date(u.created_at).toLocaleDateString() : '-'}</td><td class="py-2"><button onclick="deleteUser(${u.id})" class="text-xs text-red-400 hover:text-red-300">Hapus</button></td></tr>`).join('');
      const pag = document.getElementById('pagination');
      pag.innerHTML = Array.from({length: Math.min(data.totalPages, 10)}, (_, i) => `<button onclick="currentPage=${i+1};loadUsers()" class="px-3 py-1 rounded-lg text-xs ${i+1===currentPage?'bg-[#6C63FF] text-white':'bg-[#1e2a4a] text-slate-400 hover:text-white'}">${i+1}</button>`).join('');
    }

    async function loadFeedback() {
      const data = await api('/api/admin/feedback');
      if (!data) return;
      document.getElementById('feedback-list').innerHTML = data.feedback.map(f => `
        <div class="border-t border-[#2E3A59]/50 py-3 flex items-start gap-3">
          <span class="badge badge-${f.type} shrink-0 mt-0.5">${f.type}</span>
          <div class="flex-1"><p class="text-xs text-slate-300">${f.message}</p><p class="text-xs text-slate-500 mt-1">${f.email || 'anon'} · ${new Date(f.created_at).toLocaleDateString()}</p></div>
        </div>`).join('');
    }

    // ===================== ACTIONS =====================
    async function togglePremium(id, current) {
      const label = current ? 'Free' : 'Premium';
      const ok = await showConfirm(`Jadikan user ini <strong>${label}</strong>?`);
      if (!ok) return;
      const data = await api(`/api/admin/users/${id}/premium`, { method: 'PUT' });
      if (!data) return;
      showToast('success', `User berhasil dijadikan ${label}`);
      loadUsers();
    }

    async function deleteUser(id) {
      const ok = await showConfirm('Hapus user ini? Tindakan ini tidak bisa dibatalkan.');
      if (!ok) return;
      const data = await api(`/api/admin/users/${id}`, { method: 'DELETE' });
      if (!data) return;
      showToast('success', 'User berhasil dihapus');
      loadUsers();
      loadStats();
    }

    // ===================== INIT =====================
    (async function init() {
      const params = new URLSearchParams(window.location.search);
      const urlToken = params.get('token');
      if (urlToken) {
        token = urlToken;
        localStorage.setItem('eps_token', token);
        window.history.replaceState({}, '', '/admin.html');
      }
      if (token) { showDashboard(); loadStats(); loadUsers(); loadFeedback(); }
      else { showLogin(); }
    })();
  </script>
</body>
</html>
